name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lint
        run: |
          flake8 api/ dashboard/ tests/

      - name: Run Tests with Coverage
        run: |
          pytest tests/ -v --cov=api --cov-fail-under=75

  build:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Log in to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and Push API Image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }} -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest -f api/Dockerfile .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest

      - name: Build and Push Dashboard Image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }} -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest -f dashboard/Dockerfile .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name devops-monitor-api \
            --resource-group dernierexo_group \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }}

      - name: Deploy Dashboard to Container App
        run: |
          az containerapp update \
            --name devops-monitor-dashboard \
            --resource-group dernierexo_group \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }}
