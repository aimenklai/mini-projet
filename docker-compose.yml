version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: devops-monitor-api:latest
    container_name: devops-monitor-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: devops-monitor-dashboard:latest
    container_name: devops-monitor-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
